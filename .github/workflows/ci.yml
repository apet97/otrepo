name: CI
# CI pipeline for OTPLUS Clockify addon.
# Runs security audit, linting, type checking, unit tests, build, E2E tests,
# and deployment on push/PR to main branch.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Least-privilege principle: all jobs default to read-only repo access.
# Individual jobs (e.g. deploy) escalate permissions only where needed.
permissions:
  contents: read

jobs:
  # ── Fast checks (parallel, no dependencies) ──────────────────────────
  # security, quality, and test run in parallel because they are independent
  # of each other. This minimizes total pipeline time by letting all three
  # execute concurrently on separate runners.

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high --omit=dev

  quality:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:coverage
      - name: Worker tests
        run: npm --prefix worker ci && npm --prefix worker test
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  # ── Build (needs quality + test to pass) ─────────────────────────────
  # Build depends on quality and test so that we only produce artifacts
  # after correctness has been verified. This gates downstream jobs
  # (E2E, deploy) on a known-good codebase.
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [quality, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:prod
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          retention-days: 30

  # ── E2E (Chromium-only, uses pre-built dist) ─────────────────────────
  # E2E downloads the dist/ artifact from the build job instead of
  # rebuilding. This ensures E2E tests run against the exact same bundle
  # that will be deployed, and avoids a redundant build step.
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    env:
      # Store Playwright browsers in a cacheable location outside node_modules.
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # Cache Playwright browser binaries to avoid re-downloading ~200MB on
      # every run. The key is tied to package-lock.json so the cache is
      # invalidated when Playwright's version (and therefore browser builds)
      # changes. The restore-keys fallback allows reuse of older caches when
      # only non-Playwright dependencies change.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright (Chromium only)
        run: npx playwright install --with-deps chromium
      # Download the pre-built dist/ from the build job rather than
      # rebuilding, guaranteeing E2E runs against the deployable bundle.
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Run E2E tests
        run: npx playwright test --project=chromium
      - name: Upload test report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Release & Deploy ─────────────────────────────────────────────────
  # Release and deploy jobs only run on pushes to main (not on PRs).
  # This prevents deploying unmerged code while still running the full
  # validation pipeline on pull requests.

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, e2e]
    # Only create a release on main-branch pushes (not PRs), and only when
    # the repository variable ENABLE_PAGES is set to 'true'. This variable
    # acts as a manual toggle so maintainers can disable release creation
    # without modifying the workflow file.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.ENABLE_PAGES == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:prod
      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
      - name: Create ZIP artifact
        run: |
          cd dist
          zip -r ../otplus-v${{ steps.version.outputs.version }}.zip .
      - name: Upload release artifact
        uses: actions/upload-artifact@v7
        with:
          name: otplus-v${{ steps.version.outputs.version }}
          path: otplus-v${{ steps.version.outputs.version }}.zip
          retention-days: 90

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build, e2e]
    # Only deploy on main-branch pushes, not on PRs.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Deploy the Cloudflare Worker independently from GitHub Pages.
  # The Worker serves as the backend (API proxy, KV-backed settings,
  # lifecycle handlers) and has its own deployment target (Cloudflare),
  # so it runs as a separate job rather than being bundled with the
  # Pages deployment above.
  deploy-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    needs: [build, e2e]
    # Only deploy on main-branch pushes, not on PRs.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install worker dependencies
        run: cd worker && npm ci
      - name: Deploy to Cloudflare
        run: cd worker && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
