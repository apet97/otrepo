<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="24" fill="#2563eb"/>
  <g fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Clock circle -->
    <circle cx="64" cy="58" r="32"/>
    <!-- Hour hand -->
    <line x1="64" y1="58" x2="64" y2="40"/>
    <!-- Minute hand -->
    <line x1="64" y1="58" x2="78" y2="52"/>
    <!-- Plus sign (OT indicator) -->
    <line x1="96" y1="82" x2="96" y2="102"/>
    <line x1="86" y1="92" x2="106" y2="92"/>
  </g>
  <!-- OT text -->
  <text x="64" y="116" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#fff" text-anchor="middle">OT+</text>
</svg>
